<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Login — DRS</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{--green:#1a7a45;--dark:#0f4f2b;--lg:#e8f7ee;--amber:#f59e0b;--cream:#fdfaf5;--white:#fff;--muted:#6b7280;--border:#e5e7eb;}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--cream);min-height:100vh;display:flex;flex-direction:column}
nav{background:var(--dark);padding:14px 5%;display:flex;align-items:center;gap:10px;box-shadow:0 2px 12px rgba(0,0,0,.15)}
.brand{display:flex;align-items:center;gap:10px;text-decoration:none}
.bi{width:34px;height:34px;background:var(--amber);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px}
.bn{font-family:'Playfair Display',serif;font-size:20px;color:var(--white);font-weight:900}
.bn span{color:var(--amber)}
.wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px}
.box{background:var(--white);border-radius:24px;box-shadow:0 8px 40px rgba(15,79,43,.12);width:100%;max-width:440px;overflow:hidden}
.ah{background:linear-gradient(135deg,var(--dark),var(--green));padding:32px;text-align:center}
.ah h1{font-family:'Playfair Display',serif;color:var(--white);font-size:28px;margin-bottom:6px;font-weight:900}
.ah p{color:rgba(255,255,255,.7);font-size:14px}
.tabs{display:flex;background:#f0f7f2}
.tab{flex:1;padding:13px;text-align:center;font-size:14px;font-weight:600;cursor:pointer;color:var(--muted);border:none;background:transparent;font-family:inherit}
.tab.active{background:var(--white);color:var(--dark);border-top:3px solid var(--green)}
.form{padding:28px;display:none}
.form.active{display:block}
.fg{margin-bottom:18px}
label{display:block;font-size:13px;font-weight:600;color:#444;margin-bottom:6px}
input{width:100%;padding:12px 15px;border:2px solid var(--border);border-radius:12px;font-size:14px;font-family:inherit;background:var(--cream);transition:border .2s}
input:focus{outline:none;border-color:var(--green)}
.btn{width:100%;padding:14px;background:var(--dark);color:white;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s;margin-top:6px}
.btn:hover{background:var(--green)}
.btn:disabled{background:#aaa;cursor:not-allowed}
.msg{padding:11px 14px;border-radius:10px;font-size:13px;margin-bottom:14px;display:none;font-weight:500}
.err{background:#fef2f2;color:#b91c1c;border:1px solid #fecaca}
.ok{background:var(--lg);color:var(--dark);border:1px solid #a7d7b8}
.demo{background:var(--lg);border:1px solid #a7d7b8;border-radius:12px;padding:14px;margin-top:16px;font-size:12px;color:#1a5c33;line-height:1.9}
.demo strong{color:var(--dark)}
</style>
<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
</head>
<body>
<nav>
  <a href="index.html" class="brand"><div class="bi">🍛</div><div class="bn">D<span>R</span>S</div></a>
</nav>
<div class="wrap">
  <div class="box">
    <div class="ah"><h1>Welcome to DRS 🍛</h1><p>Canteen Food Ordering System</p></div>
    <div class="tabs">
      <button class="tab active" id="tLogin" onclick="switchTab('login')">Login</button>
      <button class="tab" id="tSignup" onclick="switchTab('signup')">Sign Up</button>
    </div>
    <div class="form active" id="loginForm">
      <div class="msg err" id="loginErr"></div>
      <div class="msg ok" id="loginOk"></div>
      <div class="fg"><label>Email</label><input type="email" id="lEmail" placeholder="Enter your email"/></div>
      <div class="fg"><label>Password</label><input type="password" id="lPass" placeholder="Enter your password"/></div>
      <button class="btn" id="loginBtn" onclick="doLogin()">Login →</button>
      <div class="demo">
        <strong>Demo Accounts:</strong><br/>
        Admin: <strong>admin@drs.com</strong> / admin123<br/>
        User: <strong>user@drs.com</strong> / user123
      </div>
    </div>
    <div class="form" id="signupForm">
      <div class="msg err" id="signupErr"></div>
      <div class="msg ok" id="signupOk"></div>
      <div class="fg"><label>Full Name</label><input type="text" id="sName" placeholder="Your full name"/></div>
      <div class="fg"><label>Email</label><input type="email" id="sEmail" placeholder="Your email address"/></div>
      <div class="fg"><label>Password</label><input type="password" id="sPass" placeholder="Minimum 6 characters"/></div>
      <button class="btn" id="signupBtn" onclick="doSignup()">Create Account →</button>
    </div>
  </div>
</div>

<script>
// ── PASTE YOUR FIREBASE CONFIG HERE ──
const firebaseConfig = {
  apiKey: "AIzaSyDNcfNUTbuq6rkH8qKDQyH-OGDEyGZivyM",
  authDomain: "drs-canteen.firebaseapp.com",
  projectId: "drs-canteen",
  storageBucket: "drs-canteen.firebasestorage.app",
  messagingSenderId: "44103188304",
  appId: "1:44103188304:web:e383bc8c02f4baec923655",
  measurementId: "G-6QS5KJN18Y"
};
firebase.initializeApp(firebaseConfig);
var db = firebase.database();

// Seed admin user in Firebase on first load
db.ref('users/admin').once('value', function(snap){
  if (!snap.exists()) {
    db.ref('users/admin').set({ name:'Admin', email:'admin@drs.com', password:'admin123', role:'admin' });
    db.ref('users/user1').set({ name:'Test User', email:'user@drs.com', password:'user123', role:'user' });
  }
});

// Check already logged in
var cu = JSON.parse(localStorage.getItem('drs_user') || 'null');
if (cu) { window.location.href = cu.role === 'admin' ? 'admin.html' : 'menu.html'; }

function switchTab(t) {
  document.querySelectorAll('.tab').forEach(function(x){ x.classList.remove('active'); });
  document.querySelectorAll('.form').forEach(function(x){ x.classList.remove('active'); });
  document.getElementById(t+'Form').classList.add('active');
  document.getElementById(t==='login'?'tLogin':'tSignup').classList.add('active');
}
function showMsg(id, msg, type) {
  var el = document.getElementById(id);
  el.textContent = msg; el.style.display = 'block';
  el.className = 'msg ' + type;
}

function doLogin() {
  var em = document.getElementById('lEmail').value.trim();
  var pw = document.getElementById('lPass').value.trim();
  document.getElementById('loginErr').style.display = 'none';
  if (!em || !pw) { showMsg('loginErr','Please fill all fields','err'); return; }
  document.getElementById('loginBtn').disabled = true;
  document.getElementById('loginBtn').textContent = 'Logging in...';
  // Find user in Firebase
  db.ref('users').orderByChild('email').equalTo(em).once('value', function(snap) {
    var found = false;
    snap.forEach(function(child) {
      var u = child.val();
      if (u.password === pw) {
        found = true;
        var userData = { id: child.key, name: u.name, email: u.email, role: u.role };
        localStorage.setItem('drs_user', JSON.stringify(userData));
        showMsg('loginOk', 'Login successful! Redirecting...', 'ok');
        setTimeout(function(){ window.location.href = u.role === 'admin' ? 'admin.html' : 'menu.html'; }, 900);
      }
    });
    if (!found) {
      showMsg('loginErr', 'Invalid email or password', 'err');
      document.getElementById('loginBtn').disabled = false;
      document.getElementById('loginBtn').textContent = 'Login →';
    }
  });
}

function doSignup() {
  var nm = document.getElementById('sName').value.trim();
  var em = document.getElementById('sEmail').value.trim();
  var pw = document.getElementById('sPass').value.trim();
  document.getElementById('signupErr').style.display = 'none';
  if (!nm || !em || !pw) { showMsg('signupErr','Please fill all fields','err'); return; }
  if (pw.length < 6) { showMsg('signupErr','Password must be 6+ characters','err'); return; }
  document.getElementById('signupBtn').disabled = true;
  document.getElementById('signupBtn').textContent = 'Creating...';
  // Check email exists
  db.ref('users').orderByChild('email').equalTo(em).once('value', function(snap) {
    if (snap.exists()) {
      showMsg('signupErr','Email already registered','err');
      document.getElementById('signupBtn').disabled = false;
      document.getElementById('signupBtn').textContent = 'Create Account →';
      return;
    }
    var newKey = db.ref('users').push().key;
    db.ref('users/' + newKey).set({ name:nm, email:em, password:pw, role:'user' }, function(){
      var userData = { id: newKey, name: nm, email: em, role: 'user' };
      localStorage.setItem('drs_user', JSON.stringify(userData));
      showMsg('signupOk','Account created! Redirecting...','ok');
      setTimeout(function(){ window.location.href = 'menu.html'; }, 900);
    });
  });
}
document.addEventListener('keydown', function(e){
  if (e.key !== 'Enter') return;
  var a = document.querySelector('.form.active');
  if (a.id === 'loginForm') doLogin(); else doSignup();
});
</script>
</body>
</html>
