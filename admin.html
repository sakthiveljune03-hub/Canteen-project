<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Admin Dashboard — DMI Smart Canteen</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap"
    rel="stylesheet" />
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <style>
    :root {
      --green: #1a7a45;
      --dark: #0b3d2e;
      --darker: #072419;
      --lg: #e6f4ec;
      --amber: #f59e0b;
      --cream: #faf8f4;
      --white: #fff;
      --muted: #6b7280;
      --border: #e5e7eb;
      --text: #111827;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--cream);
      color: var(--text);
      min-height: 100vh
    }

    nav {
      background: var(--darker);
      padding: 0 5%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 66px;
      box-shadow: 0 2px 20px rgba(0, 0, 0, .2);
      position: sticky;
      top: 0;
      z-index: 99
    }

    .nav-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none
    }

    .nav-logo {
      width: 38px;
      height: 38px;
      background: var(--amber);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px
    }

    .nav-name {
      font-family: 'Outfit', sans-serif;
      font-size: 22px;
      color: #fff;
      font-weight: 900
    }

    .nav-name em {
      color: var(--amber);
      font-style: normal
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 10px
    }

    .admin-badge {
      background: var(--amber);
      color: var(--dark);
      padding: 5px 14px;
      border-radius: 50px;
      font-size: 12px;
      font-weight: 700
    }

    .nav-logout {
      color: rgba(255, 255, 255, .55);
      text-decoration: none;
      font-size: 13px;
      padding: 7px 14px;
      border-radius: 50px;
      transition: .2s
    }

    .nav-logout:hover {
      background: rgba(255, 255, 255, .1);
      color: #fff
    }

    .live-badge {
      display: flex;
      align-items: center;
      gap: 7px;
      background: rgba(255, 255, 255, .1);
      padding: 5px 12px;
      border-radius: 50px;
      font-size: 12px;
      color: rgba(255, 255, 255, .85);
      font-weight: 600;
      border: 1px solid rgba(255, 255, 255, .15)
    }

    .live-dot {
      width: 7px;
      height: 7px;
      background: #4ade80;
      border-radius: 50%;
      animation: livePulse 1.5s infinite
    }

    @keyframes livePulse {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: .3
      }
    }

    /* ACCESS DENIED */
    .access-denied {
      min-height: 80vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px
    }

    .access-denied-emoji {
      font-size: 64px;
      margin-bottom: 16px
    }

    .access-denied h2 {
      font-family: 'Outfit', sans-serif;
      font-size: 26px;
      color: var(--dark);
      font-weight: 800;
      margin-bottom: 10px
    }

    .access-denied p {
      color: var(--muted);
      font-size: 15px;
      margin-bottom: 24px
    }

    .access-denied a {
      background: var(--dark);
      color: #fff;
      padding: 13px 28px;
      border-radius: 50px;
      text-decoration: none;
      font-weight: 700;
      font-family: 'Outfit', sans-serif
    }

    .page {
      padding: 30px 5% 60px;
      max-width: 1300px;
      margin: 0 auto
    }

    /* Stats */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 16px;
      margin-bottom: 32px
    }

    .stat-card {
      background: #fff;
      border-radius: 18px;
      padding: 22px;
      border: 1px solid var(--border);
      text-align: center;
      transition: .25s
    }

    .stat-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, .08)
    }

    .stat-emoji {
      font-size: 28px;
      margin-bottom: 10px
    }

    .stat-num {
      font-family: 'Outfit', sans-serif;
      font-size: 30px;
      font-weight: 900;
      color: var(--dark);
      margin-bottom: 4px
    }

    .stat-label {
      font-size: 12px;
      color: var(--muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .5px
    }

    /* Filter tabs */
    .filter-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
      flex-wrap: wrap;
      align-items: center
    }

    .filter-tab {
      padding: 8px 20px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: 2px solid var(--border);
      background: transparent;
      color: var(--muted);
      transition: .25s;
      font-family: 'Outfit', sans-serif
    }

    .filter-tab.active,
    .filter-tab:hover {
      background: var(--dark);
      color: #fff;
      border-color: var(--dark)
    }

    .filter-spacer {
      flex: 1
    }

    .refresh-btn {
      padding: 8px 18px;
      background: var(--lg);
      color: var(--dark);
      border: 2px solid rgba(26, 122, 69, .2);
      border-radius: 50px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Outfit', sans-serif;
      transition: .2s
    }

    .refresh-btn:hover {
      background: var(--green);
      color: #fff;
      border-color: var(--green)
    }

    /* Tabs & Sections */
    .view-tabs {
      display: flex;
      gap: 12px;
      margin-bottom: 30px;
      border-bottom: 2px solid var(--border);
      padding-bottom: 12px
    }

    .view-tab {
      padding: 10px 24px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      border: none;
      background: transparent;
      color: var(--muted);
      font-family: 'Outfit', sans-serif;
      transition: .2s
    }

    .view-tab.active {
      background: var(--dark);
      color: #fff
    }

    .section {
      display: none
    }

    .section.active {
      display: block
    }

    /* Menu Management */
    .menu-mgmt-grid {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 24px;
      align-items: start
    }

    .menu-form-card {
      background: #fff;
      border-radius: 22px;
      padding: 24px;
      border: 1px solid var(--border);
      box-shadow: 0 2px 16px rgba(0, 0, 0, .05);
      position: sticky;
      top: 100px
    }

    .menu-form-title {
      font-family: 'Outfit', sans-serif;
      font-size: 18px;
      font-weight: 800;
      color: var(--dark);
      margin-bottom: 20px
    }

    .form-group {
      margin-bottom: 16px
    }

    .form-label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      margin-bottom: 6px;
      text-transform: uppercase
    }

    .form-input,
    .form-select,
    .form-textarea {
      width: 100%;
      padding: 11px 14px;
      border: 2px solid var(--border);
      border-radius: 12px;
      font-size: 14px;
      font-family: inherit;
      background: var(--cream);
      transition: .2s
    }

    .form-input:focus,
    .form-select:focus,
    .form-textarea:focus {
      outline: none;
      border-color: var(--green);
      background: #fff
    }

    .form-submit {
      width: 100%;
      padding: 13px;
      background: var(--dark);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      font-family: 'Outfit', sans-serif;
      transition: .2s;
      margin-top: 10px
    }

    .form-submit:hover {
      background: var(--green)
    }

    /* Menu Table View */
    .menu-table-wrap {
      background: #fff;
      border-radius: 20px;
      border: 1px solid var(--border);
      overflow: hidden;
      box-shadow: 0 2px 14px rgba(0, 0, 0, .04)
    }

    .menu-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px
    }

    .menu-table th {
      background: #f8fafc;
      padding: 14px 18px;
      text-align: left;
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .5px;
      border-bottom: 2px solid var(--border)
    }

    .menu-table td {
      padding: 16px 18px;
      border-bottom: 1px solid #f1f5f9;
      vertical-align: middle
    }

    .menu-table tr:hover {
      background: #f8fafc
    }

    .mt-img {
      width: 46px;
      height: 46px;
      border-radius: 10px;
      object-fit: cover;
      background: var(--lg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px
    }

    .mt-name {
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 3px
    }

    .mt-desc {
      font-size: 11px;
      color: var(--muted);
      max-width: 200px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis
    }

    .mt-price {
      font-family: 'Outfit', sans-serif;
      font-weight: 800;
      color: var(--green);
      font-size: 15px
    }

    .mt-cat {
      font-size: 10px;
      font-weight: 700;
      background: var(--lg);
      color: var(--green);
      padding: 4px 10px;
      border-radius: 50px;
      display: inline-block
    }

    .mic-status-btn {
      padding: 7px 12px;
      border-radius: 50px;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      border: none;
      transition: .2s
    }

    .mic-status-available {
      background: #dcfce7;
      color: #16a34a
    }

    .mic-status-unavailable {
      background: #fef2f2;
      color: #ef4444
    }

    .mt-del-btn {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #fef2f2;
      color: #ef4444;
      border: none;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: .2s
    }

    .mt-del-btn:hover {
      background: #ef4444;
      color: #fff
    }

    .sync-banner {
      background: var(--lg);
      border: 1.5px dashed var(--green);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px
    }

    .sync-text {
      font-size: 13px;
      color: var(--dark);
      font-weight: 500
    }

    /* Dashboard Menu List */
    .dashboard-menu-wrap {
      background: #fff;
      border-radius: 22px;
      padding: 22px;
      border: 1px solid var(--border);
      margin-bottom: 32px;
      box-shadow: 0 2px 14px rgba(0, 0, 0, .04)
    }

    .dm-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px
    }

    .dm-title {
      font-family: 'Outfit', sans-serif;
      font-size: 18px;
      font-weight: 800;
      color: var(--dark)
    }

    .dm-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 12px
    }

    .dm-item {
      background: var(--lg);
      border-radius: 12px;
      padding: 10px;
      display: flex;
      align-items: center;
      gap: 10px;
      border: 1px solid rgba(26, 122, 69, .1)
    }

    .dm-item-emoji {
      font-size: 20px
    }

    .dm-item-info {
      flex: 1
    }

    .dm-item-name {
      font-size: 11px;
      font-weight: 700;
      color: var(--dark);
      display: block;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis
    }

    .dm-item-price {
      font-size: 10px;
      color: var(--green);
      font-weight: 700
    }


    /* Orders grid */
    .orders-section-title {
      font-family: 'Outfit', sans-serif;
      font-size: 22px;
      font-weight: 800;
      color: var(--dark);
      margin-bottom: 20px
    }

    .orders-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 20px
    }

    .order-card {
      background: #fff;
      border-radius: 22px;
      border: 1px solid var(--border);
      overflow: hidden;
      transition: all .25s;
      box-shadow: 0 2px 12px rgba(0, 0, 0, .05);
    }

    .order-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 32px rgba(0, 0, 0, .1)
    }

    .order-card.status-Placed {
      border-left: 4px solid #fb7185
    }

    .order-card.status-Confirmed {
      border-left: 4px solid #60a5fa
    }

    .order-card.status-Preparing {
      border-left: 4px solid #fb923c
    }

    .order-card.status-Ready {
      border-left: 4px solid #34d399
    }

    .order-card.status-Completed {
      border-left: 4px solid #6b7280
    }

    .oc-header {
      background: var(--darker);
      padding: 16px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center
    }

    .oc-code {
      font-family: 'DM Mono', monospace;
      font-size: 18px;
      font-weight: 700;
      color: var(--amber);
      letter-spacing: 2px
    }

    .oc-time {
      font-size: 11px;
      color: rgba(255, 255, 255, .45)
    }

    .oc-body {
      padding: 18px 20px
    }

    .oc-customer {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
      padding-bottom: 14px;
      border-bottom: 1px solid #f5f5f5
    }

    .oc-avatar {
      width: 40px;
      height: 40px;
      background: var(--lg);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Outfit', sans-serif;
      font-size: 16px;
      font-weight: 800;
      color: var(--dark);
      flex-shrink: 0
    }

    .oc-cname {
      font-size: 14px;
      font-weight: 700;
      color: var(--dark)
    }

    .oc-cemail {
      font-size: 11px;
      color: var(--muted)
    }

    .oc-items {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 14px;
      line-height: 1.8
    }

    .oc-item-chip {
      display: inline-block;
      background: #f3f4f6;
      border-radius: 50px;
      padding: 3px 10px;
      font-size: 12px;
      margin: 2px;
      color: var(--text)
    }

    .oc-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
      padding-bottom: 14px;
      border-bottom: 1px solid #f5f5f5
    }

    .oc-total-label {
      font-size: 12px;
      color: var(--muted)
    }

    .oc-total-val {
      font-family: 'Outfit', sans-serif;
      font-size: 20px;
      font-weight: 800;
      color: var(--dark)
    }

    .pay-chip {
      font-size: 11px;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 50px
    }

    .pay-chip-upi {
      background: #dcfce7;
      color: #16a34a
    }

    .pay-chip-cod {
      background: #fef3c7;
      color: #d97706
    }

    .pay-chip-pending {
      background: #f3f4f6;
      color: #6b7280
    }

    /* Status badge */
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 13px;
      border-radius: 50px;
      font-size: 12px;
      font-weight: 700
    }

    .s-Placed {
      background: #fff1f2;
      color: #be123c
    }

    .s-Confirmed {
      background: #eff6ff;
      color: #1d4ed8
    }

    .s-Preparing {
      background: #fff7ed;
      color: #c2410c
    }

    .s-Ready {
      background: var(--lg);
      color: var(--green)
    }

    .s-Completed {
      background: #f3f4f6;
      color: #6b7280
    }

    /* Status controls */
    .oc-controls {
      display: flex;
      flex-direction: column;
      gap: 8px
    }

    .oc-ctrl-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 4px
    }

    .status-btns {
      display: flex;
      gap: 6px;
      flex-wrap: wrap
    }

    .status-btn {
      padding: 7px 14px;
      border-radius: 50px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      border: 2px solid var(--border);
      background: #fff;
      color: var(--muted);
      transition: all .2s;
      font-family: inherit
    }

    .status-btn:hover {
      border-color: var(--dark);
      color: var(--dark)
    }

    .status-btn.current {
      background: var(--dark);
      color: #fff;
      border-color: var(--dark)
    }

    .status-btn:disabled {
      opacity: .4;
      cursor: not-allowed
    }

    .view-bill-btn {
      padding: 7px 14px;
      border-radius: 50px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      border: 2px solid var(--amber);
      background: var(--amber);
      color: var(--dark);
      transition: .2s;
      font-family: inherit;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
    }

    .view-bill-btn:hover {
      background: #d97706;
      border-color: #d97706;
      color: #fff
    }

    .delete-btn {
      padding: 7px 14px;
      border-radius: 50px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      border: 2px solid #fecaca;
      background: #fef2f2;
      color: #b91c1c;
      transition: .2s;
      font-family: inherit;
      display: inline-flex;
      align-items: center;
    }

    .delete-btn:hover {
      background: #b91c1c;
      color: #fff;
      border-color: #b91c1c
    }

    /* Empty */
    .empty-orders {
      text-align: center;
      padding: 80px 20px;
      background: #fff;
      border-radius: 22px;
      border: 1px solid var(--border)
    }

    .empty-orders-emoji {
      font-size: 56px;
      margin-bottom: 14px
    }

    .empty-orders h2 {
      font-family: 'Outfit', sans-serif;
      font-size: 22px;
      color: var(--dark);
      margin-bottom: 8px
    }

    .empty-orders p {
      color: var(--muted);
      font-size: 14px
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--dark);
      color: #fff;
      padding: 13px 22px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 600;
      transform: translateY(90px);
      opacity: 0;
      transition: all .3s;
      z-index: 999;
      pointer-events: none
    }

    .toast.show {
      transform: translateY(0);
      opacity: 1
    }
  </style>
</head>

<body>

  <nav>
    <a href="index.html" class="nav-brand">
      <div class="nav-logo">🍛</div>
      <div class="nav-name">D<em>M</em>I</div>
    </a>
    <div class="nav-right">
      <div class="live-badge">
        <div class="live-dot"></div>LIVE
      </div>
      <span class="admin-badge">⚙️ Admin</span>
      <a href="#" onclick="logout()" class="nav-logout">Logout</a>
    </div>
  </nav>

  <div id="rootWrap"></div>
  <div class="toast" id="toast"></div>

  <script>
    // For Firebase JS SDK v7.20.0 and later, measurementId is optional
    const firebaseConfig = {
      apiKey: "AIzaSyDVDNhJWdF5fasVKEJZn1_eu2Q2-JTAc0U",
      authDomain: "drs-quick-serve.firebaseapp.com",
      projectId: "drs-quick-serve",
      storageBucket: "drs-quick-serve.firebasestorage.app",
      messagingSenderId: "822184036587",
      appId: "1:822184036587:web:8e93bfb57eba639151d6ae",
      measurementId: "G-X8QH0L8SX6"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    var db = firebase.database();

    var user = JSON.parse(localStorage.getItem('drs_user') || 'null');
    if (!user) { window.location.href = 'auth.html' }
    if (user && user.role !== 'admin') {
      document.getElementById('rootWrap').innerHTML =
        '<div class="access-denied"><div class="access-denied-emoji">🔒</div><h2>Admin Access Only</h2><p>You need admin privileges to access this page.</p><a href="menu.html">Go to Menu</a></div>';
    } else {
      initAdmin();
    }

    var allOrders = [];
    var allMenu = [];
    var currentFilter = 'all';

    function initAdmin() {
      document.getElementById('rootWrap').innerHTML =
        '<div class="page">'
        + '<div class="view-tabs">'
        + '<button class="view-tab active" id="tab-orders" onclick="switchView(\'orders\')">📦 Orders</button>'
        + '<button class="view-tab" id="tab-menu" onclick="switchView(\'menu\')">🍽 Manage Menu</button>'
        + '</div>'

        + '<div id="ordersSection" class="section active">'
        + '<div class="stats-grid" id="statsGrid">'
        + '<div class="stat-card"><div class="stat-emoji">📋</div><div class="stat-num" id="sTotalOrders">—</div><div class="stat-label">Total Orders</div></div>'
        + '<div class="stat-card"><div class="stat-emoji">⏳</div><div class="stat-num" id="sPending">—</div><div class="stat-label">Pending</div></div>'
        + '<div class="stat-card"><div class="stat-emoji">👨‍🍳</div><div class="stat-num" id="sPreparing">—</div><div class="stat-label">Preparing</div></div>'
        + '<div class="stat-card"><div class="stat-emoji">🔔</div><div class="stat-num" id="sReady">—</div><div class="stat-label">Ready</div></div>'
        + '<div class="stat-card"><div class="stat-emoji">🍲</div><div class="stat-num" id="sMenuCount">—</div><div class="stat-label">Available</div></div>'
        + '<div class="stat-card"><div class="stat-emoji">🚫</div><div class="stat-num" id="sSoldOut">—</div><div class="stat-label">Sold Out</div></div>'
        + '<div class="stat-card"><div class="stat-emoji">💰</div><div class="stat-num" id="sRevenue">—</div><div class="stat-label">Revenue ₹</div></div>'
        + '</div>'

        + '<div class="dashboard-menu-wrap">'
        + '<div class="dm-header">'
        + '<div class="dm-title">🥘 Currently Available Menu</div>'
        + '<button class="refresh-btn" style="padding:6px 14px" onclick="switchView(\'menu\')">Manage →</button>'
        + '</div>'
        + '<div class="dm-grid" id="dashboardMenuGrid"></div>'
        + '</div>'

        + '<div class="filter-row">'
        + '<button class="filter-tab active" id="ft-all" onclick="setFilter(\'all\',this)">All</button>'
        + '<button class="filter-tab" id="ft-Placed" onclick="setFilter(\'Placed\',this)">📋 Placed</button>'
        + '<button class="filter-tab" id="ft-Confirmed" onclick="setFilter(\'Confirmed\',this)">✅ Confirmed</button>'
        + '<button class="filter-tab" id="ft-Preparing" onclick="setFilter(\'Preparing\',this)">👨‍🍳 Preparing</button>'
        + '<button class="filter-tab" id="ft-Ready" onclick="setFilter(\'Ready\',this)">🔔 Ready</button>'
        + '<button class="filter-tab" id="ft-Completed" onclick="setFilter(\'Completed\',this)">✅ Completed</button>'
        + '</div>'
        + '<div class="orders-section-title" id="ordersTitle">Live Orders</div>'
        + '<div class="orders-grid" id="ordersGrid"></div>'
        + '</div>'

        + '<div id="menuSection" class="section">'
        + '<div class="sync-banner" id="syncBanner" style="display:none">'
        + '<div class="sync-text">✨ Your Firebase menu is empty! You can sync the initial default menu items.</div>'
        + '<button class="refresh-btn" onclick="syncInitialMenu()">Sync Initial Menu</button>'
        + '</div>'
        + '<div class="menu-mgmt-grid">'
        + '<div class="menu-form-card">'
        + '<div class="menu-form-title">Add New Item</div>'
        + '<form id="menuForm" onsubmit="addMenuItem(event)">'
        + '<div class="form-group"><label class="form-label">Item Name</label><input class="form-input" id="mName" required placeholder="Ex: Sambar Rice"/></div>'
        + '<div class="form-group">'
        + '<label class="form-label">Category</label>'
        + '<select class="form-select" id="mCat" required>'
        + '<option value="Meals">Meals</option>'
        + '<option value="Snacks">Snacks</option>'
        + '<option value="Juices">Juices</option>'
        + '</select>'
        + '</div>'
        + '<div class="form-group"><label class="form-label">Price ₹</label><input class="form-input" type="number" id="mPrice" required placeholder="30"/></div>'
        + '<div class="form-group"><label class="form-label">Emoji Icon</label><input class="form-input" id="mEmoji" required placeholder="🍛"/></div>'

        + '<div class="form-group"><label class="form-label">Description</label><textarea class="form-textarea" id="mDesc" rows="2" placeholder="Hot rice with sambar..."></textarea></div>'
        + '<button class="form-submit" type="submit">Add Item to Menu</button>'
        + '</form>'
        + '</div>'
        + '<div>'
        + '<div class="orders-section-title">Current Canteen Menu</div>'
        + '<div class="menu-table-wrap" id="menuGrid"></div>'
        + '</div>'
        + '</div>'
        + '</div>'
        + '</div>';

      // Live listener for Orders
      db.ref('orders').on('value', function (snap) {
        var orders = [];
        snap.forEach(function (child) { orders.push(Object.assign({ key: child.key }, child.val())) });
        // Sort newest first
        orders.sort(function (a, b) { return (b.timestamp || 0) - (a.timestamp || 0) });
        allOrders = orders;
        updateStats();
        renderOrders();
      });

      // Live listener for Menu (Shared)
      db.ref('menu').on('value', function (snap) {
        var items = [];
        snap.forEach(function (c) { items.push(Object.assign({ key: c.key }, c.val())) });
        allMenu = items;
        updateStats(); // To update menu item count
        renderDashboardMenu();
        if (document.getElementById('menuSection').classList.contains('active')) renderMenuAdmin();
      });
    }

    function updateStats() {
      var stats = { Placed: 0, Confirmed: 0, Preparing: 0, Ready: 0, Completed: 0 };
      var revenue = 0;
      allOrders.forEach(function (o) { if (stats[o.status] !== undefined) stats[o.status]++; revenue += o.total || 0 });

      var availCount = allMenu.filter(function (it) { return it.available !== false }).length;

      document.getElementById('sTotalOrders').textContent = allOrders.length;
      document.getElementById('sPending').textContent = (stats.Placed + stats.Confirmed);
      document.getElementById('sPreparing').textContent = stats.Preparing;
      document.getElementById('sReady').textContent = stats.Ready;
      document.getElementById('sRevenue').textContent = '₹' + revenue;
      if (document.getElementById('sMenuCount')) document.getElementById('sMenuCount').textContent = availCount;
      if (document.getElementById('sSoldOut')) document.getElementById('sSoldOut').textContent = (allMenu.length - availCount);
    }

    function setFilter(f, el) {
      currentFilter = f;
      document.querySelectorAll('.filter-tab').forEach(function (t) { t.classList.remove('active') });
      el.classList.add('active');
      renderOrders();
    }

    function renderOrders() {
      var filtered = currentFilter === 'all' ? allOrders : allOrders.filter(function (o) { return o.status === currentFilter });
      var el = document.getElementById('ordersGrid');
      var titleEl = document.getElementById('ordersTitle');
      if (titleEl) titleEl.textContent = (currentFilter === 'all' ? 'All' : '') + (currentFilter !== 'all' ? currentFilter : '') + ' Orders (' + filtered.length + ')';
      if (!filtered.length) {
        el.innerHTML = '<div class="empty-orders" style="grid-column:1/-1"><div class="empty-orders-emoji">📭</div><h2>No orders ' + (currentFilter === 'all' ? 'yet' : 'with status: ' + currentFilter) + '</h2><p>Orders will appear here in real time as customers place them.</p></div>';
        return;
      }
      el.innerHTML = filtered.map(function (order) { return orderCard(order) }).join('');
    }

    var STATUSES = ['Placed', 'Confirmed', 'Preparing', 'Ready', 'Completed'];
    var PAY_LABELS = { upi: ['pay-chip-upi', '✓ UPI Paid'], paid: ['pay-chip-upi', '✓ UPI Paid'], razorpay: ['pay-chip-upi', '✓ Paid'], cod: ['pay-chip-cod', '💵 Cash'] };

    function orderCard(o) {
      var pChip = PAY_LABELS[o.payMethod] || ['pay-chip-pending', 'Pending'];
      var avatar = (o.userName || '?').charAt(0).toUpperCase();
      var itemsStr = (o.items || []).map(function (it) { return '<span class="oc-item-chip">' + it.emoji + ' ' + it.name + ' x' + it.qty + '</span>' }).join('');
      var statusBtns = STATUSES.map(function (s) {
        var isCur = o.status === s;
        return '<button class="status-btn' + (isCur ? ' current' : '') + '" onclick="updateStatus(\'' + o.code + '\',\'' + s + '\')" ' + (isCur ? 'disabled' : '') + '>' + s + '</button>';
      }).join('');
      return '<div class="order-card status-' + o.status + '" id="oc-' + o.code + '">'
        + '<div class="oc-header">'
        + '<div class="oc-code">' + o.code + '</div>'
        + '<div class="oc-time">' + (o.time || '') + '</div>'
        + '</div>'
        + '<div class="oc-body">'
        + '<div class="oc-customer">'
        + '<div class="oc-avatar">' + avatar + '</div>'
        + '<div><div class="oc-cname">' + (o.userName || 'Guest') + '</div><div class="oc-cemail">' + (o.userEmail || '') + '</div></div>'
        + '</div>'
        + '<div class="oc-items">' + itemsStr + '</div>'
        + '<div class="oc-row">'
        + '<div><div class="oc-total-label">Total</div><div class="oc-total-val">₹' + (o.total || 0) + '</div></div>'
        + '<div style="text-align:right">'
        + '<span class="status-badge s-' + o.status + '">' + o.status + '</span><br/>'
        + '<span class="pay-chip ' + pChip[0] + '" style="margin-top:6px;display:inline-block">' + pChip[1] + '</span>'
        + '</div>'
        + '</div>'
        + '<div class="oc-controls">'
        + '<div class="oc-ctrl-label">Update Status:</div>'
        + '<div class="status-btns">' + statusBtns + '</div>'
        + '<div style="display:flex;gap:8px;margin-top:8px">'
        + '<a href="bill.html?code=' + o.code + '" target="_blank" class="view-bill-btn">🧾 View Bill</a>'
        + '<button class="delete-btn" onclick="deleteOrder(\'' + o.code + '\')">🗑 Delete Order</button>'
        + '</div>'
        + '</div>'
        + '</div>'
        + '</div>';
    }

    function updateStatus(code, newStatus) {
      db.ref('orders/' + code + '/status').set(newStatus, function (err) {
        if (!err) showToast('Order ' + code + ' → ' + newStatus + ' ✓');
        else showToast('Error updating status');
      });
    }
    function deleteOrder(code) {
      if (!confirm('Delete order ' + code + '? This cannot be undone.')) return;
      db.ref('orders/' + code).remove(function () { showToast('Order ' + code + ' deleted') });
    }
    function showToast(msg) {
      var t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show');
      setTimeout(function () { t.classList.remove('show') }, 2500);
    }
    function logout() { localStorage.removeItem('drs_user'); window.location.href = 'auth.html' }

    /* VIEW SWITCHER */
    function switchView(v) {
      document.querySelectorAll('.view-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
      document.getElementById('tab-' + v).classList.add('active');
      document.getElementById(v + 'Section').classList.add('active');
      if (v === 'menu') loadMenu();
    }

    /* MENU LOGIC */
    function loadMenu() {
      // Listener already initialized in initAdmin
      document.getElementById('syncBanner').style.display = allMenu.length === 0 ? 'flex' : 'none';
      renderMenuAdmin();
    }

    function renderDashboardMenu() {
      var grid = document.getElementById('dashboardMenuGrid');
      if (!grid) return;
      if (!allMenu.length) {
        grid.innerHTML = '<div style="font-size:12px;color:var(--muted)">No items found.</div>';
        return;
      }
      grid.innerHTML = allMenu.map(function (it) {
        var isAvail = it.available !== false;
        var visual = '<span class="dm-item-emoji">' + it.e + '</span>';
        return '<div class="dm-item" style="' + (!isAvail ? 'opacity:0.5;filter:grayscale(1)' : '') + '">'
          + visual
          + '<div class="dm-item-info">'
          + '<span class="dm-item-name">' + it.n + '</span>'
          + '<span class="dm-item-price">' + (isAvail ? '₹' + it.p : '🚫 Out') + '</span>'
          + '</div>'
          + '</div>';
      }).join('');
    }

    function renderMenuAdmin() {
      var grid = document.getElementById('menuGrid');
      if (!allMenu.length) {
        grid.innerHTML = '<div style="text-align:center;padding:40px;color:var(--muted)">Menu is empty. Add items or sync default menu.</div>';
        return;
      }

      var html = '<table class="menu-table">'
        + '<thead><tr><th>Item</th><th>Category</th><th>Price</th><th>Status</th><th>Actions</th></tr></thead>'
        + '<tbody>';

      html += allMenu.map(function (it) {
        var isAvail = it.available !== false;
        var visual = '<div class="mt-img">' + it.e + '</div>';
        return '<tr style="' + (!isAvail ? 'opacity:0.6' : '') + '">'
          + '<td>'
          + '<div style="display:flex;align-items:center;gap:14px">'
          + visual
          + '<div><div class="mt-name">' + it.n + '</div><div class="mt-desc">' + (it.d || '') + '</div></div>'
          + '</div>'
          + '</td>'
          + '<td><span class="mt-cat">' + it.cat + '</span></td>'
          + '<td><div class="mt-price">₹' + it.p + '</div></td>'
          + '<td>'
          + '<button class="mic-status-btn ' + (isAvail ? 'mic-status-available' : 'mic-status-unavailable') + '" onclick="toggleAvailability(\'' + it.key + '\',' + isAvail + ')">'
          + (isAvail ? '🟢 Available' : '🔴 Sold Out')
          + '</button>'
          + '</td>'
          + '<td>'
          + '<button class="mt-del-btn" onclick="deleteMenuItem(\'' + it.key + '\')" title="Delete">✕</button>'
          + '</td>'
          + '</tr>';
      }).join('');

      html += '</tbody></table>';
      grid.innerHTML = html;
    }

    function addMenuItem(e) {
      e.preventDefault();
      var item = {
        n: document.getElementById('mName').value,
        cat: document.getElementById('mCat').value,
        p: parseInt(document.getElementById('mPrice').value),
        e: document.getElementById('mEmoji').value,

        d: document.getElementById('mDesc').value,
        available: true,
        bg: '#fff' // Default
      };
      db.ref('menu').push(item).then(() => {
        showToast('Item added successfully!');
        document.getElementById('menuForm').reset();
      });
    }

    function toggleAvailability(key, current) {
      db.ref('menu/' + key + '/available').set(!current).then(() => showToast('Status updated'));
    }

    function deleteMenuItem(key) {
      if (!confirm('Remove this item from menu?')) return;
      db.ref('menu/' + key).remove().then(() => showToast('Item removed'));
    }

    function syncInitialMenu() {
      var initial = [
        { cat: 'Meals', bg: '#fff8eb', e: '🍛', n: 'Full Meals (Saapadu)', d: 'Rice, sambar, rasam, kootu, papad & pickle', p: 60, available: true },
        { cat: 'Meals', bg: '#fff0e8', e: '🍲', n: 'Sambar Rice', d: 'Hot rice with thick homestyle sambar', p: 30, available: true },
        { cat: 'Meals', bg: '#f0fff4', e: '🍚', n: 'Curd Rice (Thayir Sadam)', d: 'Creamy curd rice with mango pickle', p: 25, available: true },
        { cat: 'Meals', bg: '#fffbf0', e: '🥗', n: 'Lemon Rice (Elumichai Sadam)', d: 'Tangy lemon rice with peanuts', p: 30, available: true },
        { cat: 'Meals', bg: '#fff0f0', e: '🥘', n: 'Fried Rice', d: 'Spicy stir-fried rice with vegetables', p: 30, available: true },
        { cat: 'Meals', bg: '#f0f0ff', e: '🥣', n: 'Rasam Rice', d: 'Light peppery rasam with soft white rice', p: 25, available: true },
        { cat: 'Meals', bg: '#fff8e8', e: '🍱', n: 'Veg Biryani', d: 'Fragrant basmati rice with fresh vegetables', p: 70, available: true },
        { cat: 'Snacks', bg: '#fff8f0', e: '⚪️', n: 'Idli (2 pcs)', d: 'Soft steamed rice cakes with sambar & chutney', p: 20, available: true },
        { cat: 'Snacks', bg: '#fff0e8', e: '🫓', n: 'Masala Dosa', d: 'Crispy rice crepe with spiced potato filling', p: 35, available: true },
        { cat: 'Snacks', bg: '#f0fff4', e: '🍩', n: 'Medhu Vadai', d: 'Crispy urad dal fritters with coconut chutney', p: 15, available: true },
        { cat: 'Snacks', bg: '#fffbf0', e: '🍩', n: 'Masala Vadai', d: 'Spiced chana dal fritters — crispy outside', p: 15, available: true },
        { cat: 'Snacks', bg: '#f0f0ff', e: '🍵', n: 'Pongal', d: 'Creamy rice & dal with ghee, pepper & cashews', p: 25, available: true },
        { cat: 'Snacks', bg: '#fff0f8', e: '🧆', n: 'Bonda', d: 'Deep fried crispy potato balls with mint chutney', p: 15, available: true },
        { cat: 'Snacks', bg: '#f8fff0', e: '🫔', n: 'Bajji (Plate)', d: 'Battered & fried vegetables — hot & crispy', p: 20, available: true },
        { cat: 'Snacks', bg: '#fff8f8', e: '🥨', n: 'Murukku (Pack)', d: 'Crunchy spiral rice flour snack', p: 10, available: true },
        { cat: 'Juices', bg: '#f0fff4', e: '🥤', n: 'Nannari Sherbet', d: 'Traditional cooling herbal root drink', p: 20, available: true },
        { cat: 'Juices', bg: '#fff8f0', e: '🍹', n: 'Sugarcane Juice', d: 'Fresh pressed sweet sugarcane with lemon', p: 25, available: true },
        { cat: 'Juices', bg: '#f0f8ff', e: '🥥', n: 'Tender Coconut (Elaneer)', d: 'Fresh tender coconut water — cool & natural', p: 40, available: true },
        { cat: 'Juices', bg: '#f8fff8', e: '🥛', n: 'Buttermilk (Mor)', d: 'Spiced yogurt cooling drink with curry leaves', p: 15, available: true },
        { cat: 'Juices', bg: '#fff0f8', e: '🍷', n: 'Rose Milk', d: 'Sweet chilled rose flavoured milk', p: 20, available: true },
        { cat: 'Juices', bg: '#fff8e8', e: '☕', n: 'Filter Coffee / Tea', d: 'Traditional South Indian decoction coffee', p: 20, available: true }
      ];
      if (!confirm('Sync ' + initial.length + ' default items to Firebase with accurate images?')) return;
      var promises = initial.map(it => db.ref('menu').push(it));
      Promise.all(promises).then(() => {
        showToast('Menu synced successfully! ✨');
        document.getElementById('syncBanner').style.display = 'none';
      });
    }
  </script>

</body>

</html>
