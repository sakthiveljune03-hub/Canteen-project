<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Track Order — DRS</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{--green:#1a7a45;--dark:#0f4f2b;--lg:#e8f7ee;--amber:#f59e0b;--cream:#fdfaf5;--white:#fff;--muted:#6b7280;--border:#e5e7eb;}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--cream);min-height:100vh}
nav{background:var(--dark);padding:14px 5%;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:99;box-shadow:0 2px 12px rgba(0,0,0,.15)}
.brand{display:flex;align-items:center;gap:10px;text-decoration:none}
.bi{width:34px;height:34px;background:var(--amber);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px}
.bn{font-family:'Playfair Display',serif;font-size:20px;color:var(--white);font-weight:900}
.bn span{color:var(--amber)}
.nl a{color:rgba(255,255,255,.8);text-decoration:none;font-size:13px;margin-left:14px}
.pg{padding:36px 5%;max-width:700px;margin:0 auto}
.pgt{font-family:'Playfair Display',serif;font-size:28px;color:var(--dark);margin-bottom:6px;font-weight:700}
.pgs{color:var(--muted);font-size:14px;margin-bottom:26px}
/* LAST ORDER BANNER */
.banner{background:var(--dark);border-radius:18px;padding:22px 24px;margin-bottom:22px;display:none}
.bl{font-size:11px;color:rgba(255,255,255,.55);font-weight:700;letter-spacing:1.2px;text-transform:uppercase;margin-bottom:6px}
.bc{font-family:'Playfair Display',serif;font-size:30px;font-weight:900;color:var(--amber);letter-spacing:3px;margin-bottom:10px}
.livebadge{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.12);padding:5px 12px;border-radius:50px;font-size:12px;color:rgba(255,255,255,.8);font-weight:600}
.dot{width:7px;height:7px;background:#4ade80;border-radius:50%;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.search-box{background:var(--white);border-radius:16px;padding:22px;box-shadow:0 2px 15px rgba(0,0,0,.06);margin-bottom:22px}
.sl{font-size:13px;font-weight:600;color:#444;margin-bottom:10px}
.srow{display:flex;gap:10px}
.sinp{flex:1;padding:12px 16px;border:2px solid var(--border);border-radius:12px;font-size:14px;font-family:inherit;background:var(--cream);text-transform:uppercase}
.sinp:focus{outline:none;border-color:var(--green)}
.sbtn{padding:12px 22px;background:var(--dark);color:white;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
.sbtn:hover{background:var(--green)}
/* ORDER CARD */
.oc{background:var(--white);border-radius:18px;padding:28px;box-shadow:0 2px 15px rgba(0,0,0,.06)}
.oh{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:22px}
.ocode{font-family:'Playfair Display',serif;font-size:22px;color:var(--dark);font-weight:700}
.otime{font-size:12px;color:#aaa;margin-top:4px}
.badge{padding:6px 16px;border-radius:50px;font-size:12px;font-weight:700}
.bPlaced{background:#fee2e2;color:#b91c1c}
.bConfirmed{background:#e0e7ff;color:#3730a3}
.bPreparing{background:#fff7ed;color:#c2410c}
.bReady{background:var(--lg);color:#166534}
.bCompleted{background:#f0fdf4;color:#15803d}
.tl{margin:22px 0}
.tstep{display:flex;align-items:flex-start;gap:14px}
.tleft{display:flex;flex-direction:column;align-items:center}
.tdot{width:36px;height:36px;border-radius:50%;border:3px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:15px;background:var(--white);color:#ccc;flex-shrink:0}
.tdot.done{border-color:var(--green);background:var(--green);color:white}
.tdot.active{border-color:var(--amber);background:var(--amber);color:var(--dark)}
.tline{width:2px;height:28px;background:var(--border);margin:3px 0}
.tline.done{background:var(--green)}
.tinfo{padding:5px 0 26px}
.tlbl{font-size:14px;font-weight:600;color:var(--muted)}
.tlbl.done{color:var(--green);font-weight:700}
.tlbl.active{color:var(--amber);font-weight:700}
.tsub{font-size:12px;color:#aaa;margin-top:2px}
hr{border:none;border-top:1px solid #f0f0f0;margin:18px 0}
.ititle{font-size:13px;font-weight:700;margin-bottom:10px;color:#444}
.oi{display:flex;justify-content:space-between;font-size:13px;padding:7px 0;border-bottom:1px solid #f9f9f9;color:#555}
.oi:last-child{border-bottom:none}
.tr{display:flex;justify-content:space-between;font-size:16px;font-weight:700;margin-top:12px;color:var(--dark)}
.nf{text-align:center;padding:40px;color:var(--muted);font-size:15px;background:var(--white);border-radius:18px;box-shadow:0 2px 15px rgba(0,0,0,.06)}
</style>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
</head>
<body>
<nav>
  <a href="index.html" class="brand"><div class="bi">🍛</div><div class="bn">D<span>R</span>S</div></a>
  <div class="nl"><a href="menu.html">Menu</a><a href="cart.html">Cart</a></div>
</nav>

<div class="pg">
  <h1 class="pgt">Track Your Order</h1>
  <p class="pgs">Your order status updates live — no need to refresh!</p>

  <!-- LAST ORDER BANNER -->
  <div class="banner" id="banner">
    <div class="bl">📌 Your Last Order Code</div>
    <div class="bc" id="bannerCode">DRS-0000</div>
    <div class="livebadge"><div class="dot"></div> Tracking Live</div>
  </div>

  <!-- SEARCH -->
  <div class="search-box">
    <div class="sl">Search by Order Code</div>
    <div class="srow">
      <input type="text" class="sinp" id="codeInput" placeholder="Enter order code eg: DRS-1234"/>
      <button class="sbtn" onclick="search()">Track</button>
    </div>
  </div>
  <div id="result"></div>
</div>

<script>
// ── PASTE YOUR FIREBASE CONFIG HERE ──
const firebaseConfig = {
  apiKey: "AIzaSyDNcfNUTbuq6rkH8qKDQyH-OGDEyGZivyM",
  authDomain: "drs-canteen.firebaseapp.com",
  projectId: "drs-canteen",
  storageBucket: "drs-canteen.firebasestorage.app",
  messagingSenderId: "44103188304",
  appId: "1:44103188304:web:e383bc8c02f4baec923655",
  measurementId: "G-6QS5KJN18Y"
};
firebase.initializeApp(firebaseConfig);
var db = firebase.database();

var STEPS = [
  {key:'Placed',    icon:'📋', label:'Order Placed',     sub:'Your order has been received'},
  {key:'Confirmed', icon:'✅', label:'Confirmed',         sub:'Order confirmed by kitchen'},
  {key:'Preparing', icon:'🍳', label:'Preparing',         sub:'Being freshly prepared for you'},
  {key:'Ready',     icon:'🔔', label:'Ready for Pickup!', sub:'Please collect from the counter'},
  {key:'Completed', icon:'🎉', label:'Completed',         sub:'Enjoy your meal!'}
];
var FLOW = ['Placed','Confirmed','Preparing','Ready','Completed'];
var liveListener = null;

function renderOrder(order){
  var si = FLOW.indexOf(order.status);
  var tlHtml = STEPS.map(function(step,i){
    var done=i<si, active=i===si;
    var dc=done?'done':active?'active':'';
    var lc=i<si?'done':'';
    var lc2=done?'done':active?'active':'';
    var line=i<STEPS.length-1?'<div class="tline '+lc+'"></div>':'';
    return '<div class="tstep"><div class="tleft"><div class="tdot '+dc+'">'+step.icon+'</div>'+line+'</div><div class="tinfo"><div class="tlbl '+lc2+'">'+step.label+'</div><div class="tsub">'+step.sub+'</div></div></div>';
  }).join('');
  var itemsHtml = order.items.map(function(it){
    return '<div class="oi"><span>'+it.emoji+' '+it.name+' x'+it.qty+'</span><span>₹'+(it.price*it.qty)+'</span></div>';
  }).join('');
  var discHtml = order.discount>0 ? '<div class="oi" style="color:var(--green)"><span>Coupon discount</span><span>−₹'+order.discount+'</span></div>' : '';
  document.getElementById('result').innerHTML =
    '<div class="oc">' +
      '<div class="oh"><div><div class="ocode">'+order.code+'</div><div class="otime">'+order.time+'</div></div>' +
      '<span class="badge b'+order.status+'">'+order.status+'</span></div>' +
      '<div class="tl">'+tlHtml+'</div>' +
      '<hr/><div class="ititle">Items Ordered:</div>'+itemsHtml+discHtml+
      '<div class="tr"><span>Total Paid</span><span>₹'+order.total+'</span></div>' +
    '</div>';
}

function trackCode(code){
  if (liveListener) liveListener();  // remove old listener
  document.getElementById('result').innerHTML = '<div class="nf">🔍 Loading order...</div>';
  // Firebase LIVE listener — updates instantly when admin changes status!
  liveListener = db.ref('orders/'+code).on('value', function(snap){
    if (!snap.exists()) {
      document.getElementById('result').innerHTML = '<div class="nf">No order found with code: '+code+'</div>';
      return;
    }
    renderOrder(snap.val());
  });
}

function search(){
  var code = (document.getElementById('codeInput').value||'').trim().toUpperCase();
  if (!code) return;
  trackCode(code);
}

// Auto load last order
var last = localStorage.getItem('drs_last_order');
if (last) {
  document.getElementById('bannerCode').textContent = last;
  document.getElementById('banner').style.display = 'block';
  document.getElementById('codeInput').value = last;
  trackCode(last);
}
</script>
</body>
</html>
