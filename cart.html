<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Cart — DRS</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{--green:#1a7a45;--dark:#0f4f2b;--lg:#e8f7ee;--amber:#f59e0b;--cream:#fdfaf5;--white:#fff;--muted:#6b7280;--border:#e5e7eb;}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--cream);min-height:100vh}
nav{background:var(--dark);padding:14px 5%;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:99;box-shadow:0 2px 12px rgba(0,0,0,.15)}
.brand{display:flex;align-items:center;gap:10px;text-decoration:none}
.bi{width:34px;height:34px;background:var(--amber);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px}
.bn{font-family:'Playfair Display',serif;font-size:20px;color:var(--white);font-weight:900}
.bn span{color:var(--amber)}
.back{color:rgba(255,255,255,.8);text-decoration:none;font-size:14px;font-weight:500}
.pg{padding:30px 5%;max-width:920px;margin:0 auto}
.pgt{font-family:'Playfair Display',serif;font-size:28px;color:var(--dark);margin-bottom:24px;font-weight:700}
.wrap{display:grid;grid-template-columns:1fr 340px;gap:22px}
.box,.sbox{background:var(--white);border-radius:18px;padding:24px;box-shadow:0 2px 15px rgba(0,0,0,.06)}
.sbox{height:fit-content;position:sticky;top:80px}
.ci{display:flex;align-items:center;gap:14px;padding:14px 0;border-bottom:1px solid #f0f0f0}
.ci:last-child{border-bottom:none}
.ce{font-size:34px;width:48px;text-align:center}
.cn{font-size:14px;font-weight:700;margin-bottom:3px}
.cpr{font-size:12px;color:var(--amber);font-weight:600}
.qc{display:flex;align-items:center;gap:10px}
.qb{width:30px;height:30px;border-radius:50%;border:2px solid var(--border);background:var(--white);font-size:16px;cursor:pointer;font-weight:700;transition:all .2s}
.qb:hover{background:var(--dark);color:white;border-color:var(--dark)}
.qn{font-size:15px;font-weight:700;min-width:22px;text-align:center}
.rb{background:none;border:none;color:#ddd;font-size:18px;cursor:pointer}
.rb:hover{color:#ef4444}
.st{font-family:'Playfair Display',serif;font-size:18px;color:var(--dark);margin-bottom:18px;font-weight:700}
.sr{display:flex;justify-content:space-between;font-size:14px;margin-bottom:10px;color:var(--muted)}
.stot{display:flex;justify-content:space-between;font-size:17px;font-weight:700;padding-top:14px;border-top:2px solid var(--border);margin-top:6px;color:var(--dark)}
.cb{margin:18px 0}
.cl{font-size:13px;font-weight:600;margin-bottom:8px;display:block;color:#444}
.cr{display:flex;gap:8px}
.cin{flex:1;padding:10px 14px;border:2px solid var(--border);border-radius:10px;font-size:13px;font-family:inherit;background:var(--cream);text-transform:uppercase}
.cin:focus{outline:none;border-color:var(--green)}
.ab{padding:10px 16px;background:var(--dark);color:white;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
.cm{font-size:12px;margin-top:6px;font-weight:500}
.cok{color:var(--green)}.cerr{color:#ef4444}
.hint{font-size:11px;color:#aaa;margin-top:5px}
.pb{width:100%;padding:15px;background:var(--green);color:white;border:none;border-radius:14px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:16px;transition:all .2s}
.pb:hover{background:var(--dark)}
.pb:disabled{background:#aaa;cursor:not-allowed}
.empty{text-align:center;padding:60px 0}
.empty p{font-size:18px;color:var(--muted);margin-bottom:20px}
.empty a{background:var(--dark);color:white;padding:12px 28px;border-radius:50px;text-decoration:none;font-weight:700}
/* POPUP */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:9999;display:none;align-items:center;justify-content:center}
.popup{background:var(--white);border-radius:24px;padding:36px 30px;text-align:center;max-width:400px;width:92%;box-shadow:0 20px 60px rgba(0,0,0,.25);animation:pop .3s ease}
@keyframes pop{from{transform:scale(.85);opacity:0}to{transform:scale(1);opacity:1}}
.picon{font-size:60px;margin-bottom:12px}
.ph{font-family:'Playfair Display',serif;font-size:24px;color:var(--dark);margin-bottom:8px;font-weight:700}
.pp{font-size:14px;color:var(--muted);line-height:1.6;margin-bottom:4px}
.cbox{background:var(--lg);border:2px dashed var(--green);border-radius:16px;padding:18px;margin:18px 0}
.clbl{font-size:11px;color:var(--green);font-weight:700;letter-spacing:1.5px;margin-bottom:8px;text-transform:uppercase}
.cval{font-family:'Playfair Display',serif;font-size:34px;font-weight:900;color:var(--dark);letter-spacing:3px}
.note{font-size:12px;color:#aaa;margin-bottom:20px}
.tbtn{display:block;background:var(--dark);color:white;padding:14px;border-radius:50px;font-size:15px;font-weight:700;text-decoration:none}
.tbtn:hover{background:var(--green)}
@media(max-width:700px){.wrap{grid-template-columns:1fr}}
</style>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
</head>
<body>
<nav>
  <a href="index.html" class="brand"><div class="bi">🍛</div><div class="bn">D<span>R</span>S</div></a>
  <a href="menu.html" class="back">← Back to Menu</a>
</nav>

<!-- ORDER SUCCESS POPUP -->
<div class="overlay" id="overlay">
  <div class="popup">
    <div class="picon">✅</div>
    <div class="ph">Order Placed!</div>
    <p class="pp">Your food is being freshly prepared.</p>
    <p class="pp">Save this code to track your order:</p>
    <div class="cbox">
      <div class="clbl">📌 Your Order Code</div>
      <div class="cval" id="codeDisplay">DRS-0000</div>
    </div>
    <p class="note">Admin can see your order live right now!</p>
    <a href="tracker.html" class="tbtn">Track My Order →</a>
  </div>
</div>

<div class="pg">
  <h1 class="pgt">Your Cart 🛒</h1>
  <div id="main"></div>
</div>

<script>
// ── PASTE YOUR FIREBASE CONFIG HERE ──
const firebaseConfig = {
  apiKey: "AIzaSyDNcfNUTbuq6rkH8qKDQyH-OGDEyGZivyM",
  authDomain: "drs-canteen.firebaseapp.com",
  projectId: "drs-canteen",
  storageBucket: "drs-canteen.firebasestorage.app",
  messagingSenderId: "44103188304",
  appId: "1:44103188304:web:e383bc8c02f4baec923655",
  measurementId: "G-6QS5KJN18Y"
};
firebase.initializeApp(firebaseConfig);
var db = firebase.database();

var user = JSON.parse(localStorage.getItem('drs_user') || 'null');
if (!user) { window.location.href = 'auth.html'; }
var cart = JSON.parse(localStorage.getItem('drs_cart') || '[]');
var discount = 0, couponCode = '';
var COUPONS = { DRS10:10, DRS20:20, WELCOME:15 };

function render(){
  var el = document.getElementById('main');
  if (!cart.length) {
    el.innerHTML = '<div class="empty"><p>Your cart is empty!</p><a href="menu.html">Browse Menu</a></div>';
    return;
  }
  var sub = cart.reduce(function(s,x){ return s+x.price*x.qty; },0);
  var total = Math.max(0, sub-discount);
  var ih = cart.map(function(it){
    return '<div class="ci"><div class="ce">'+it.emoji+'</div><div style="flex:1"><div class="cn">'+it.name+'</div><div class="cpr">₹'+it.price+' each</div></div><div class="qc"><button class="qb" onclick="chg('+it.id+',-1)">−</button><span class="qn">'+it.qty+'</span><button class="qb" onclick="chg('+it.id+',1)">+</button></div><button class="rb" onclick="rm('+it.id+')">✕</button></div>';
  }).join('');
  var disc = discount>0 ? '<div class="sr" style="color:var(--green)"><span>Coupon ('+couponCode+')</span><span>−₹'+discount+'</span></div>' : '';
  el.innerHTML = '<div class="wrap"><div class="box">'+ih+'</div><div class="sbox"><div class="st">Order Summary</div><div class="sr"><span>Subtotal</span><span>₹'+sub+'</span></div>'+disc+'<div class="stot"><span>Total</span><span>₹'+total+'</span></div><div class="cb"><span class="cl">Have a coupon?</span><div class="cr"><input class="cin" id="cin" placeholder="Enter coupon code" value="'+couponCode+'"/><button class="ab" onclick="apply()">Apply</button></div><div class="cm" id="cmsg"></div><div class="hint">Try: DRS10 | DRS20 | WELCOME</div></div><button class="pb" id="placeBtn" onclick="place()">Place Order →</button></div></div>';
}
function chg(id,d){ var i=cart.findIndex(function(x){return x.id===id;}); if(i<0)return; cart[i].qty+=d; if(cart[i].qty<=0)cart.splice(i,1); save(); }
function rm(id){ cart=cart.filter(function(x){return x.id!==id;}); save(); }
function save(){ localStorage.setItem('drs_cart',JSON.stringify(cart)); render(); }
function apply(){
  var c=(document.getElementById('cin').value||'').trim().toUpperCase();
  var m=document.getElementById('cmsg');
  if(!c){m.textContent='Enter a coupon code';m.className='cm cerr';return;}
  if(COUPONS[c]){couponCode=c;discount=COUPONS[c];m.textContent='Applied! −₹'+discount+' off';m.className='cm cok';render();}
  else{couponCode='';discount=0;m.textContent='Invalid coupon code';m.className='cm cerr';}
}
function place(){
  if(!cart.length) return;
  var btn = document.getElementById('placeBtn');
  btn.disabled = true; btn.textContent = 'Placing Order...';
  var sub = cart.reduce(function(s,x){ return s+x.price*x.qty; },0);
  var total = Math.max(0, sub-discount);
  var code = 'DRS-' + Math.floor(1000+Math.random()*9000);
  var order = {
    code: code,
    userName: user.name,
    userEmail: user.email,
    userId: user.id,
    items: cart,
    subtotal: sub,
    discount: discount,
    total: total,
    status: 'Placed',
    time: new Date().toLocaleString(),
    timestamp: Date.now()
  };
  // Save to Firebase — admin sees it instantly!
  db.ref('orders/' + code).set(order, function(err){
    if (err) {
      btn.disabled = false; btn.textContent = 'Place Order →';
      alert('Error placing order. Check your Firebase config.');
      return;
    }
    localStorage.setItem('drs_last_order', code);
    localStorage.setItem('drs_cart', JSON.stringify([]));
    document.getElementById('codeDisplay').textContent = code;
    document.getElementById('overlay').style.display = 'flex';
  });
}
render();
</script>
</body>
</html>
