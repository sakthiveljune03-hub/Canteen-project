<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Track Order — DMI Smart Canteen</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap"
    rel="stylesheet" />
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <style>
    :root {
      --green: #1a7a45;
      --dark: #0b3d2e;
      --darker: #072419;
      --lg: #e6f4ec;
      --amber: #f59e0b;
      --cream: #faf8f4;
      --white: #fff;
      --muted: #6b7280;
      --border: #e5e7eb;
      --text: #111827;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--cream);
      color: var(--text);
      min-height: 100vh
    }

    nav {
      background: var(--darker);
      padding: 0 5%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 66px;
      box-shadow: 0 2px 20px rgba(0, 0, 0, .2);
      position: sticky;
      top: 0;
      z-index: 99
    }

    .nav-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none
    }

    .nav-logo {
      width: 38px;
      height: 38px;
      background: var(--amber);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px
    }

    .nav-name {
      font-family: 'Outfit', sans-serif;
      font-size: 22px;
      color: #fff;
      font-weight: 900
    }

    .nav-name em {
      color: var(--amber);
      font-style: normal
    }

    .live-badge {
      display: flex;
      align-items: center;
      gap: 7px;
      background: rgba(255, 255, 255, .1);
      padding: 6px 14px;
      border-radius: 50px;
      font-size: 12px;
      color: rgba(255, 255, 255, .85);
      font-weight: 600;
      border: 1px solid rgba(255, 255, 255, .15)
    }

    .live-dot {
      width: 8px;
      height: 8px;
      background: #4ade80;
      border-radius: 50%;
      animation: livePulse 1.5s infinite;
      box-shadow: 0 0 6px #4ade80
    }

    @keyframes livePulse {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: .3
      }
    }

    .page {
      padding: 28px 5% 60px;
      max-width: 720px;
      margin: 0 auto
    }

    /* Search */
    .search-card {
      background: #fff;
      border-radius: 18px;
      padding: 20px;
      box-shadow: 0 2px 16px rgba(0, 0, 0, .06);
      margin-bottom: 24px;
      border: 1px solid var(--border)
    }

    .search-card-title {
      font-family: 'Outfit', sans-serif;
      font-size: 16px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 14px
    }

    .search-row {
      display: flex;
      gap: 10px
    }

    .search-input {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid var(--border);
      border-radius: 12px;
      font-size: 14px;
      font-family: 'DM Mono', monospace;
      text-transform: uppercase;
      background: var(--cream);
      transition: .2s;
      color: var(--text)
    }

    .search-input:focus {
      outline: none;
      border-color: var(--green);
      background: #fff
    }

    .search-btn {
      padding: 12px 20px;
      background: var(--dark);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      font-family: 'Outfit', sans-serif;
      transition: .2s;
      white-space: nowrap
    }

    .search-btn:hover {
      background: var(--green)
    }

    /* Loading */
    .loading {
      text-align: center;
      padding: 80px 0
    }

    .spinner {
      width: 44px;
      height: 44px;
      border: 3px solid var(--border);
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin .85s linear infinite;
      margin: 0 auto 16px
    }

    @keyframes spin {
      to {
        transform: rotate(360deg)
      }
    }

    .loading p {
      color: var(--muted);
      font-size: 15px
    }

    /* Order header */
    .order-header {
      background: linear-gradient(135deg, var(--darker), var(--dark));
      border-radius: 22px;
      padding: 26px;
      color: #fff;
      margin-bottom: 20px;
      position: relative;
      overflow: hidden;
      animation: fadeUp .4s ease
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(12px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    .order-header::before {
      content: '';
      position: absolute;
      width: 220px;
      height: 220px;
      background: rgba(255, 255, 255, .04);
      border-radius: 50%;
      top: -70px;
      right: -50px
    }

    .oh-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 18px
    }

    .oh-code {
      font-family: 'DM Mono', monospace;
      font-size: 30px;
      font-weight: 700;
      color: var(--amber);
      letter-spacing: 2px
    }

    .oh-time {
      font-size: 11px;
      color: rgba(255, 255, 255, .45);
      text-align: right;
      line-height: 1.8
    }

    .oh-customer-label {
      font-size: 10px;
      color: rgba(255, 255, 255, .35);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 4px
    }

    .oh-name {
      font-size: 17px;
      font-weight: 700;
      color: #fff
    }

    .oh-email {
      font-size: 12px;
      color: rgba(255, 255, 255, .45)
    }

    .oh-badges {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 16px
    }

    .oh-badge {
      padding: 5px 14px;
      border-radius: 50px;
      font-size: 12px;
      font-weight: 700
    }

    .badge-items {
      background: rgba(255, 255, 255, .12);
      color: rgba(255, 255, 255, .85)
    }

    .badge-total {
      background: var(--amber);
      color: var(--dark)
    }

    .badge-paid {
      background: #16a34a;
      color: #fff
    }

    .badge-cod {
      background: #d97706;
      color: #fff
    }

    .badge-pending {
      background: rgba(255, 255, 255, .15);
      color: rgba(255, 255, 255, .7)
    }

    /* Status banner */
    .status-banner {
      border-radius: 16px;
      padding: 18px 22px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      border: 1.5px solid;
      animation: fadeUp .4s ease
    }

    .sb-placed {
      background: #fff1f2;
      border-color: #fecdd3
    }

    .sb-confirmed {
      background: #eff6ff;
      border-color: #bfdbfe
    }

    .sb-preparing {
      background: #fff7ed;
      border-color: #fed7aa
    }

    .sb-ready {
      background: var(--lg);
      border-color: #bbf7d0
    }

    .sb-completed {
      background: #f0fdf4;
      border-color: #86efac
    }

    .sb-icon {
      font-size: 34px;
      flex-shrink: 0
    }

    .sb-title {
      font-family: 'Outfit', sans-serif;
      font-size: 17px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 4px
    }

    .sb-msg {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.6
    }

    .sb-pulse {
      width: 10px;
      height: 10px;
      background: var(--amber);
      border-radius: 50%;
      animation: livePulse 1.5s infinite;
      margin-left: auto;
      flex-shrink: 0
    }

    /* Tracking steps */
    .track-card {
      background: #fff;
      border-radius: 22px;
      padding: 28px;
      box-shadow: 0 2px 16px rgba(0, 0, 0, .06);
      margin-bottom: 20px;
      border: 1px solid var(--border);
      animation: fadeUp .5s ease
    }

    .track-card-title {
      font-family: 'Outfit', sans-serif;
      font-size: 20px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 4px
    }

    .track-card-sub {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 28px
    }

    .steps-wrap {
      position: relative;
      padding-left: 0
    }

    .step-line-bg {
      position: absolute;
      left: 21px;
      top: 22px;
      bottom: 22px;
      width: 2px;
      background: var(--border);
      z-index: 0
    }

    .step-line-fill {
      position: absolute;
      left: 21px;
      top: 22px;
      width: 2px;
      background: linear-gradient(to bottom, var(--dark), var(--green));
      z-index: 1;
      height: 0%;
      transition: height 1.4s cubic-bezier(.4, 0, .2, 1)
    }

    .step-row {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      padding: 11px 0;
      position: relative;
      z-index: 2
    }

    .step-circle {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 2.5px solid var(--border);
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
      transition: all .5s ease
    }

    .step-circle.done {
      background: var(--green);
      border-color: var(--green);
      color: #fff
    }

    .step-circle.active {
      background: var(--dark);
      border-color: var(--dark);
      color: #fff;
      animation: stepGlow 2s infinite
    }

    @keyframes stepGlow {

      0%,
      100% {
        box-shadow: 0 0 0 4px rgba(11, 61, 46, .15)
      }

      50% {
        box-shadow: 0 0 0 10px rgba(11, 61, 46, .06)
      }
    }

    .step-body {
      flex: 1;
      padding-top: 8px
    }

    .step-name {
      font-size: 14px;
      font-weight: 700;
      color: #d1d5db;
      transition: color .4s
    }

    .step-name.done {
      color: var(--green)
    }

    .step-name.active {
      color: var(--dark)
    }

    .step-desc {
      font-size: 12px;
      color: #e5e7eb;
      margin-top: 3px;
      transition: color .4s
    }

    .step-desc.done {
      color: #86efac
    }

    .step-desc.active {
      color: var(--muted)
    }

    .step-tag {
      font-size: 11px;
      font-weight: 700;
      margin-top: 5px
    }

    .step-tag.done {
      color: var(--green)
    }

    .step-tag.active {
      color: var(--amber)
    }

    /* Items card */
    .items-card {
      background: #fff;
      border-radius: 22px;
      padding: 24px;
      box-shadow: 0 2px 16px rgba(0, 0, 0, .06);
      margin-bottom: 20px;
      border: 1px solid var(--border);
      animation: fadeUp .6s ease
    }

    .card-title {
      font-family: 'Outfit', sans-serif;
      font-size: 18px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 16px;
      padding-bottom: 14px;
      border-bottom: 2px solid var(--border)
    }

    .item-row {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 0;
      border-bottom: 1px solid #f5f5f5
    }

    .item-row:last-child {
      border-bottom: none
    }

    .item-emoji {
      font-size: 28px;
      width: 40px;
      text-align: center
    }

    .item-info {
      flex: 1
    }

    .item-name {
      font-size: 13px;
      font-weight: 700;
      color: var(--dark)
    }

    .item-unit {
      font-size: 11px;
      color: var(--amber);
      font-weight: 600;
      margin-top: 2px
    }

    .item-qty {
      background: #f3f4f6;
      font-size: 12px;
      font-weight: 700;
      color: #555;
      padding: 3px 10px;
      border-radius: 50px
    }

    .item-amt {
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      font-weight: 700;
      color: var(--dark)
    }

    .grand-total-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 16px;
      border-top: 2.5px solid var(--dark);
      margin-top: 8px
    }

    .gt-label {
      font-family: 'Outfit', sans-serif;
      font-size: 15px;
      font-weight: 700;
      color: var(--dark)
    }

    .gt-val {
      font-family: 'Outfit', sans-serif;
      font-size: 28px;
      font-weight: 900;
      color: var(--dark)
    }

    /* Actions */
    .action-row {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      animation: fadeUp .7s ease
    }

    .act-btn {
      flex: 1;
      padding: 14px;
      border-radius: 14px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      font-family: 'Outfit', sans-serif;
      border: none;
      transition: all .25s;
      text-decoration: none;
      text-align: center;
      display: block
    }

    .act-primary {
      background: var(--dark);
      color: #fff
    }

    .act-primary:hover {
      background: var(--green);
      box-shadow: 0 6px 18px rgba(11, 61, 46, .3)
    }

    .act-secondary {
      background: #fff;
      color: var(--dark);
      border: 2px solid var(--border)
    }

    .act-secondary:hover {
      border-color: var(--dark)
    }

    /* Not found */
    .not-found {
      text-align: center;
      padding: 70px 20px;
      background: #fff;
      border-radius: 22px;
      box-shadow: 0 2px 16px rgba(0, 0, 0, .06);
      border: 1px solid var(--border)
    }

    .nf-emoji {
      font-size: 56px;
      margin-bottom: 16px
    }

    .nf-title {
      font-family: 'Outfit', sans-serif;
      font-size: 22px;
      color: var(--dark);
      font-weight: 800;
      margin-bottom: 10px
    }

    .nf-sub {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.75
    }

    @media(max-width:600px) {
      .action-row {
        flex-direction: column
      }

      .oh-code {
        font-size: 24px
      }
    }
  </style>
</head>

<body>

  <nav>
    <a href="index.html" class="nav-brand">
      <div class="nav-logo">🍛</div>
      <div class="nav-name">D<em>M</em>I</div>
    </a>
    <div class="live-badge">
      <div class="live-dot"></div>LIVE TRACKING
    </div>
  </nav>

  <div class="page">
    <!-- SEARCH -->
    <div class="search-card">
      <div class="search-card-title">🔍 Track Your Order</div>
      <div class="search-row">
        <input class="search-input" id="searchInput" placeholder="Enter Order Code — DMI-1234" maxlength="12" />
        <button class="search-btn" onclick="searchOrder()">Track</button>
      </div>
    </div>
    <!-- CONTENT -->
    <div id="content">
      <div class="loading">
        <div class="spinner"></div>
        <p>Loading your order...</p>
      </div>
    </div>
  </div>

  <script>
    // For Firebase JS SDK v7.20.0 and later, measurementId is optional
    const firebaseConfig = {
      apiKey: "AIzaSyDVDNhJWdF5fasVKEJZn1_eu2Q2-JTAc0U",
      authDomain: "drs-quick-serve.firebaseapp.com",
      projectId: "drs-quick-serve",
      storageBucket: "drs-quick-serve.firebasestorage.app",
      messagingSenderId: "822184036587",
      appId: "1:822184036587:web:8e93bfb57eba639151d6ae",
      measurementId: "G-X8QH0L8SX6"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    var db = firebase.database();

    var urlCode = new URLSearchParams(window.location.search).get('code') || '';
    var lastCode = localStorage.getItem('drs_last_order') || '';
    var orderCode = urlCode || lastCode;
    var currentListener = null;

    if (orderCode) {
      document.getElementById('searchInput').value = orderCode.toUpperCase();
      loadOrder(orderCode);
    } else {
      showNotFound('Enter your order code above to track your order.<br/>Your order code was shown when you placed the order.');
    }

    function searchOrder() {
      var code = (document.getElementById('searchInput').value || '').trim().toUpperCase();
      if (!code) { alert('Please enter your order code — Example: DMI-1234'); return }
      loadOrder(code);
    }
    document.getElementById('searchInput').addEventListener('keypress', function (e) { if (e.key === 'Enter') searchOrder() });

    function loadOrder(code) {
      document.getElementById('content').innerHTML = '<div class="loading"><div class="spinner"></div><p>Fetching ' + code + '...</p></div>';
      if (currentListener) { db.ref('orders/' + currentListener).off() }
      currentListener = code;
      db.ref('orders/' + code).on('value', function (snap) {
        if (!snap.exists()) { showNotFound('Order <strong>' + code + '</strong> not found.<br/>Please check your order code and try again.'); return }
        renderTracker(snap.val());
      }, function () { showNotFound('Connection error. Please check your internet connection.') });
    }

    var STEPS = [
      { key: 'Placed', icon: '📋', name: 'Order Placed', desc: 'Order received by the canteen' },
      { key: 'Confirmed', icon: '✅', name: 'Order Confirmed', desc: 'Canteen has confirmed your order' },
      { key: 'Preparing', icon: '👨‍🍳', name: 'Preparing Food', desc: 'Your Tamil food is being cooked fresh' },
      { key: 'Ready', icon: '🔔', name: 'Ready for Pickup', desc: 'Food is ready — collect from counter!' },
      { key: 'Completed', icon: '🎉', name: 'Completed', desc: 'Order collected — Enjoy your meal!' },
    ];
    var STATUS_ORDER = ['Placed', 'Confirmed', 'Preparing', 'Ready', 'Completed'];
    var STATUS_INFO = {
      Placed: { icon: '📋', title: 'Order Placed!', msg: 'Waiting for canteen to confirm your order.', cls: 'sb-placed' },
      Confirmed: { icon: '✅', title: 'Order Confirmed!', msg: 'Great! The canteen has confirmed your order.', cls: 'sb-confirmed' },
      Preparing: { icon: '👨‍🍳', title: 'Food Being Prepared!', msg: 'Your fresh Tamil food is being cooked right now.', cls: 'sb-preparing' },
      Ready: { icon: '🔔', title: 'Ready for Pickup!', msg: 'Your food is ready at the counter. Please collect it!', cls: 'sb-ready' },
      Completed: { icon: '🎉', title: 'Order Completed!', msg: 'Thank you! Enjoy your delicious Tamil food. Come again!', cls: 'sb-completed' },
    };

    function renderTracker(order) {
      var status = order.status || 'Placed';
      var si = STATUS_ORDER.indexOf(status); if (si < 0) si = 0;
      var info = STATUS_INFO[status] || STATUS_INFO['Placed'];

      var isUPI = order.payMethod === 'upi' || order.payMethod === 'paid' || order.payMethod === 'razorpay';
      var isCOD = order.payMethod === 'cod';
      var payBadge = isUPI
        ? '<span class="oh-badge badge-paid">✓ Paid Online</span>'
        : isCOD ? '<span class="oh-badge badge-cod">💵 Cash on Delivery</span>'
          : '<span class="oh-badge badge-pending">Payment Pending</span>';

      // Steps
      var stepsHtml = STEPS.map(function (step, i) {
        var done = i < si, active = i === si;
        return '<div class="step-row">'
          + '<div class="step-circle ' + (done ? 'done' : active ? 'active' : '') + '">' + (done ? '✓' : step.icon) + '</div>'
          + '<div class="step-body">'
          + '<div class="step-name ' + (done ? 'done' : active ? 'active' : '') + '">' + step.name + '</div>'
          + '<div class="step-desc ' + (done ? 'done' : active ? 'active' : '') + '">' + step.desc + '</div>'
          + (done ? '<div class="step-tag done">✓ Done</div>' : '')
          + (active ? '<div class="step-tag active">⏰ Right Now</div>' : '')
          + '</div>'
          + '</div>';
      }).join('');
      var fillPct = si === 0 ? 0 : Math.min(100, (si / (STEPS.length - 1)) * 100);

      // Items
      var itemsHtml = (order.items || []).map(function (it) {
        var visual = '<div class="item-emoji">' + it.emoji + '</div>';
        return '<div class="item-row">'
          + visual
          + '<div class="item-info"><div class="item-name">' + it.name + '</div><div class="item-unit">₹' + it.price + ' each</div></div>'
          + '<div class="item-qty">x' + it.qty + '</div>'
          + '<div class="item-amt">₹' + (it.price * it.qty) + '</div>'
          + '</div>';
      }).join('');
      var discHtml = (order.discount && order.discount > 0)
        ? '<div style="display:flex;justify-content:space-between;padding:8px 0;font-size:13px;color:var(--green);font-weight:700"><span>🏷️ Coupon Discount</span><span>−₹' + order.discount + '</span></div>'
        : '';

      document.getElementById('content').innerHTML =
        '<div class="order-header">'
        + '<div class="oh-top">'
        + '<div><div style="font-size:10px;color:rgba(255,255,255,.35);letter-spacing:2px;text-transform:uppercase;margin-bottom:4px">Order Code</div><div class="oh-code">' + (order.code || '--') + '</div></div>'
        + '<div class="oh-time"><div style="margin-bottom:3px">Placed at</div>' + (order.time || '--') + '</div>'
        + '</div>'
        + '<div class="oh-customer-label">Customer</div>'
        + '<div class="oh-name">' + (order.userName || 'Guest') + '</div>'
        + '<div class="oh-email">' + (order.userEmail || '') + '</div>'
        + '<div class="oh-badges">'
        + '<span class="oh-badge badge-items">🍽 ' + (order.items ? order.items.length : 0) + ' Items</span>'
        + '<span class="oh-badge badge-total">₹' + (order.total || 0) + '</span>'
        + payBadge
        + '</div>'
        + '</div>'

        + '<div class="status-banner ' + info.cls + '">'
        + '<div class="sb-icon">' + info.icon + '</div>'
        + '<div><div class="sb-title">' + info.title + '</div><div class="sb-msg">' + info.msg + '</div></div>'
        + (status !== 'Completed' ? '<div class="sb-pulse"></div>' : '')
        + '</div>'

        + '<div class="track-card">'
        + '<div class="track-card-title">📍 Live Order Tracking</div>'
        + '<div class="track-card-sub">Updates automatically — no refresh needed!</div>'
        + '<div class="steps-wrap">'
        + '<div class="step-line-bg"></div>'
        + '<div class="step-line-fill" id="stepFill"></div>'
        + stepsHtml
        + '</div>'
        + '</div>'

        + '<div class="items-card">'
        + '<div class="card-title">Your Order Items</div>'
        + itemsHtml + discHtml
        + '<div class="grand-total-row"><div class="gt-label">Grand Total</div><div class="gt-val">₹' + (order.total || 0) + '</div></div>'
        + '</div>'

        + '<div class="action-row">'
        + '<a class="act-btn act-primary" href="bill.html?code=' + (order.code || '') + '">🧾 View Bill</a>'
        + '<a class="act-btn act-secondary" href="menu.html">🍽 Order Again</a>'
        + '</div>';

      setTimeout(function () { var el = document.getElementById('stepFill'); if (el) el.style.height = fillPct + '%' }, 300);
    }

    function showNotFound(msg) {
      document.getElementById('content').innerHTML =
        '<div class="not-found"><div class="nf-emoji">🔍</div><div class="nf-title">Order Not Found</div><div class="nf-sub">' + msg + '</div></div>';
    }
  </script>
</body>

</html>
